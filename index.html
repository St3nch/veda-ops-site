<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEDA OPS // SIGNAL ONLINE</title>
  <meta name="description" content="VEDA OPS // SIGNAL ONLINE" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scanlines"></div>
  <main class="shell">
    <div class="shell-top">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      <span class="shell-label">vedaops.dev :: terminal</span>
    </div>

    <section class="hero">
      <p class="kicker">[ SIGNAL ONLINE ]</p>
      <h1>VEDA OPS</h1>
      <p class="tagline">Deterministic search intelligence for live project ecosystems.</p>
    </section>

    <section class="console">
      <div class="line"><span class="prompt">&gt;</span> status<span class="cursor"></span></div>
      <div class="response">online</div>

      <div class="line"><span class="prompt">&gt;</span> observatory</div>
      <div class="response">active</div>

      <div class="line"><span class="prompt">&gt;</span> intake</div>
      <div class="response">controlled</div>

      <div class="line"><span class="prompt">&gt;</span> contact</div>
      <div class="response">ops@vedaops.dev</div>
    </section>

    <section class="footer-block">
      <p class="small">NOISE DOWN. SIGNAL UP.</p>
    </section>
  </main>
</body>
</html>
